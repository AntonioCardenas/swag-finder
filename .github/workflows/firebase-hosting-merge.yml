# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create environment files
        run: |
          mkdir -p src/environments
          echo "${{ secrets.ENVIRONMENT_TS }}" > src/environments/environment.ts
          echo "${{ secrets.ENVIRONMENT_PROD_TS }}" > src/environments/environment.prod.ts
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWAG_TRACKERNG }}
          channelId: live
          projectId: swag-trackerng
